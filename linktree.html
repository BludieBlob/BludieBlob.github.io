<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Satria Data ITS 2026</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: url('background.jpg') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlay blur + gelap */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgb(138, 136, 136);
            z-index: 1;
        }

        /* Container utama */
        .main-card {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 400px;
            background: rgb(235, 229, 229);
            border-radius: 20px;
            padding: 2%;
            text-align: center;
        }

        /* Tombol atas */
        .top-buttons {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
        }

        .top-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        /* Profile */
        .profile img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .profile h2 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .profile p {
            font-size: 13px;
            color: #555;
            margin-bottom: 20px;
        }

        /* Tombol YT & IG */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .social-icons a {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            font-size: 16px;
            transition: 0.3s;
            text-decoration: none;
        }

        /* List tombol */
        .link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5%;
            margin: 3%;
            border-radius: 12px;
            background: #ffffff;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* Hover effect + glow */
        .link:hover {
            background: rgb(235, 229, 229);
        }

        /* Button bawah */
        .join-btn {
            margin-top: 20px;
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: #fff;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="overlay"></div>

    <div class="main-card">
        <div class="top-buttons">
            <div class="top-btn"><i class="fas fa-snowflake"></i></div>
            <div class="top-btn"><i class="fas fa-arrow-up-from-bracket"></i></div>
        </div>
        <div class="profile">
            <img src="https://ugc.production.linktr.ee/00151526-9d98-4c00-b912-6734bf789b4a_Screenshot-20260326-132834-Instagram.jpeg?io=true&amp;size=avatar-v3_0"
                alt="logo">
            <h2>@satriadataits2026</h2>
            <p>Integrated Link Satria Data ITS 2026</p>
        </div>

        <div class="social-icons">
            <a href="#"><i class="fab fa-youtube"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>

        <div class="link">Seleksi Internal SIC <span class="dots">⋮</span></div>
        <div class="link">Seleksi Internal NSC <span class="dots">⋮</span></div>
        <div class="link">Seleksi Internal SEC <span class="dots">⋮</span></div>
        <div class="link">Seleksi Internal BDC <span class="dots">⋮</span></div>
        <div class="link">PPT Sosialisasi <span class="dots">⋮</span></div>
        <div class="link">Record Zoom Sosialisasi <span class="dots">⋮</span></div>

        <button class="join-btn">Join satriadataits2026 on Linktree</button>
    </div>

</body>

</html>
